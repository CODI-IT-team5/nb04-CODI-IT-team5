version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: codi-it-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codi-it}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:latest
    container_name: codi-it-redis
    ports:
      - '6379:6379'
    restart: always

volumes:
  pgdata:
